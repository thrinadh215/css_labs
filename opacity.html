<!DOCTYPE html>
<html>
  <head>
    <style>
      .img1 {
        opacity: 1;
      }
      .img2 {
        opacity: 0.5;
      }
      .img3 {
        opacity: 0.75;
      }
      .img4 {
        opacity: 0.1;
      }
      .opacity{
        height: 100px;
        width: 100px;
        border: 3px solid black;
        margin-bottom: 10px;
        background: cyan;
        opacity: 0.5;
      }
      .alpha{
        height: 100px;
        width: 100px;
        border: 3px solid black;
        background-color: rgba(84, 173, 176,0.5);
      }
    </style>
  </head>
  <body>
    <img
      class="img1"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 1.0 (default)</p>
    <img
      class="img2"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.5</p>
    <img
      class="img3"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.75</p>
    <img
      class="img4"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.1</p>
    <hr>
    <h2>difference between opacity and alpha </h2>
    <div class="opacity">
        <p>this is opacity</p>
    </div>
    <div class="alpha"><p>this is alpha</p></div>
  </body>
</html>
