<!DOCTYPE html>
<html>
  <head>
    <style>
      .img1 {
        opacity: 1;
      }
      .img2 {
        opacity: 0.5;
      }
      .img3 {
        opacity: 0.75;
      }
      .img4 {
        opacity: 0.1;
      }
    </style>
  </head>
  <body>
    <img
      class="img1"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 1.0 (default)</p>
    <img
      class="img2"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.5</p>
    <img
      class="img3"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.75</p>
    <img
      class="img4"
      src="lion.jpg"
      alt="www"
      width="170"
      height="100"
    />
    <p>opacity 0.1</p>
  </body>
</html>
