<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Flexbox ordering example</title>
    <style>
      html {
        font-family: sans-serif;
      }
 
      body {
        width: 70%;
        max-width: 960px;
        margin: 20px auto;
      }
 
      button {
        font-size: 18px;
        line-height: 1.5;
        width: 15%;
      }
 
      div {
        height: 100px;
        border: 1px solid black;
      }
 
      /* Add your flexbox CSS below here */
 
      div {
        display: flex;
        align-items: center;
        justify-content: space-around;
      }
      button{
        overflow: hidden;
      }
 
      /* button:first-child {
        order: 2;
      }
 
      button:last-child {
        order: -2;
      } */
       .btn1{
        order:5
       }
       .btn2{
        order:3
       }
       .btn3{
        order:1
       }
       .btn4{
        order:2
       }
       .btn5{
        order:4
       }
    </style>
  </head>
  <body>
    <div>
      <button class="btn1">Smile</button>
      <button class="btn2">Laugh</button>
      <button class="btn3">Care</button>
      <button class="btn4">Work</button>
      <button class="btn5">Relax</button>
    </div>
  </body>
</html>
