<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>CSS Grid fixed column tracks</title>
    <style>
      body {
        width: 90%;
        max-width: 900px;
        margin: 2em auto;
        font: 0.9em/1.2 Arial, Helvetica, sans-serif;
      }
 
      .container {
        display: grid;
        /* grid-template-columns: repeat(3,200px); */
        grid-template-columns: 1fr 2fr 3fr;
        gap: 20px;
      }
 
      .container > div {
        border-radius: 5px;
        text-align: center;
        padding: 10px;
        background-color: rgb(207, 232, 220);
        border: 2px solid rgb(79, 185, 227);
      }
    </style>
  </head>
 
  <body>
    <h1>Simple grid example</h1>
 
    <div class="container">
      <div>One</div>
      <div>Two</div>
      <div>Three</div>
      <div>Four</div>
      <div>Five</div>
      <div>Six</div>
      <div>Seven</div><div>Eight</div><div>Nine</div>
    </div>
  </body>
</html>
